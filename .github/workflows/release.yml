name: release

# ONE pipeline → ONE complete "Latest" release, every push.
#
# Every push that changes the app, engine, payload, on-console PS5 app, or
# VERSION rebuilds EVERYTHING and publishes a single consolidated GitHub
# release (tag = v<VERSION>) marked "Latest", carrying ALL of our tools in
# its assets:
#
#   • XENO_TOOL_<ver>_x64-setup.exe   — the desktop app installer (NSIS)
#   • latest.json                     — in-app auto-updater manifest
#   • CheatRunner.elf                 — on-console cheat engine (carried fwd)
#   • XENO-AIO.elf                    — on-console all-in-one (payload + web UI)
#
# This replaces the old split (ps5-app.yml built only the ELFs; the desktop
# installer was uploaded by hand and went stale). The auto-updater reads
# /releases/latest/download/latest.json, so a fresh, complete Latest release
# every time is exactly what keeps both the "Setup" exe and the updater current.

on:
  push:
    # Only main builds a release. Without this filter, Dependabot's PR
    # branches (build(deps): bump …) trip the path globs below and each
    # spins up a full, pointless release run that can fail at publish.
    branches:
      - main
    paths:
      - 'client/**'
      - 'engine/**'
      - 'payload/**'
      - 'scripts/gen-updater-manifest.py'
      - 'scripts/update-version.js'
      - 'VERSION'
      - '.github/workflows/release.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# One release build per ref; a newer push cancels the in-flight one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── PS5 payload ELF (embedded into the desktop exe at compile time). It's
  #    gitignored, so it MUST be built; build.rs include_bytes!'s it. ───────
  build-payload:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install payload toolchain (pinned LLVM 18)
        run: |
          # The SDK's prospero-clang/prospero-lld are wrapper scripts that
          # resolve a host LLVM via prospero-llvm-config (it searches PATH
          # for llvm-config-NN). Pin LLVM 18 to match the SDK contract and
          # this repo's install-ubuntu.sh, and expose llvm-config-18 on PATH.
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18 llvm-18-dev unzip file
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"

      - name: Download PS5 Payload SDK
        env:
          PS5_SDK_TAG: v0.40
        run: |
          curl --retry 3 --retry-delay 5 --retry-connrefused \
            --fail --location --silent --show-error \
            -o /tmp/ps5-payload-sdk.zip \
            "https://github.com/ps5-payload-dev/sdk/releases/download/${PS5_SDK_TAG}/ps5-payload-sdk.zip"
          sudo unzip -q /tmp/ps5-payload-sdk.zip -d /opt

      - name: Smoke-check the prospero toolchain
        env:
          PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk
        run: |
          # Fail fast with a clear message if the wrapper can't resolve LLVM,
          # instead of a confusing mid-compile error inside `make payload`.
          "$PS5_PAYLOAD_SDK/bin/prospero-clang" --version

      - name: Build payload ELF (+ DPI install daemon)
        env:
          PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk
        run: make payload

      - name: Verify payload + DPI artifacts
        run: |
          test -s payload/ps5upload.elf
          # `make payload` depends on `dpi`, which produces the gz the desktop
          # build embeds (build.rs gates the DPI install daemon on its presence).
          gzip -kf payload/ps5upload.elf
          test -s payload/ps5upload.elf.gz
          test -s payload/dpi/ezremote-dpi.elf.gz
          ls -la payload/ps5upload.elf.gz payload/dpi/ezremote-dpi.elf.gz

      # ── XENO TOOL Web ELF (XENO-AIO.elf): on-console web server that
      #    serves the embedded React UI. Needs the built frontend (dist/)
      #    plus the prospero toolchain already set up above. ──────────────
      - name: Setup Node (for the embedded web UI)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Regenerate payloads catalog JSON (keep in sync with Rust const)
        run: python3 payload/web/gen_payloads_catalog.py client/src-tauri/src/commands/payloads.rs client/public/payloads-catalog.json

      - name: Extract cheatslist.json for the on-console Trainers/Title Search
        run: unzip -o client/src-tauri/resources/titles-seed.zip cheatslist.json -d client/public/

      - name: Build frontend (dist/) for the web ELF
        working-directory: client
        run: |
          npm ci --no-audit --no-fund
          npm run build:vite
          # Embed CHANGELOG.md so the on-console "What's new" tab can load it.
          cp ../CHANGELOG.md dist/CHANGELOG.md

      - name: Build XENO-AIO ELF (full payload + embedded web server)
        env:
          PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk
        run: make -C payload aio

      - name: Verify XENO-AIO ELF
        run: |
          test -s payload/XENO-AIO.elf
          test -s payload/XENO-AIO.elf.gz
          ls -la payload/XENO-AIO.elf payload/XENO-AIO.elf.gz

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload
          path: |
            payload/ps5upload.elf.gz
            payload/dpi/ezremote-dpi.elf.gz
            payload/XENO-AIO.elf
            payload/XENO-AIO.elf.gz
          if-no-files-found: error

  # ── Windows desktop installer (NSIS) + engine sidecar. ────────────────────
  build-desktop:
    needs: [build-payload]
    runs-on: windows-2022   # pinned for WebView2/MSVC reproducibility
    timeout-minutes: 45
    env:
      RUST_TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Sync version from VERSION
        run: node scripts/update-version.js

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + tauri target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
            engine/target
          # CRITICAL: include VERSION in the key. update-version.js bumps the
          # version line in Cargo.toml but NOT Cargo.lock, so a pure Cargo.lock-
          # hash key let actions/cache restore the prior build's target/ —
          # including bundle/nsis/*.exe with the OLD manifest.rc. tauri-build's
          # build.rs doesn't re-run on Cargo.toml-only version bumps, so the
          # cached .exe got renamed to the new tag and shipped. Versions
          # 3.2.20/3.2.21 both went out as the 3.2.19 binary because of this.
          # No restore-keys fallback for the same reason.
          key: ${{ runner.os }}-x64-desktop-v${{ hashFiles('VERSION') }}-${{ hashFiles('client/src-tauri/Cargo.lock', 'engine/Cargo.lock') }}

      - name: Ensure libclang for bindgen
        shell: bash
        run: |
          # jpegxr's build runs bindgen, which loads libclang.dll into the
          # host build process. Pin LIBCLANG_PATH so clang-sys resolves it.
          set -u
          find_libclang() {
            for d in \
              "/c/Program Files/LLVM/bin" \
              "/c/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/Llvm/bin" \
              "/c/Program Files/Microsoft Visual Studio/2022/Community/VC/Tools/Llvm/bin"; do
              if [ -f "$d/libclang.dll" ]; then echo "$d"; return 0; fi
            done
            return 1
          }
          dir="$(find_libclang || true)"
          if [ -z "$dir" ]; then
            choco install llvm -y --no-progress
            dir="$(find_libclang || true)"
          fi
          if [ -n "$dir" ]; then
            win="$(cygpath -w "$dir")"
            echo "LIBCLANG_PATH=$win" >> "$GITHUB_ENV"
            echo "Using libclang at: $win"
          else
            echo "WARNING: no host libclang found; jpegxr/bindgen may fail" >&2
          fi

      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund

      - name: Restore payload artifact
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: artifact-payload

      - name: Place payload files at the paths build.rs expects
        shell: bash
        run: |
          # Robust to whatever internal layout the artifact has: find the
          # files and copy them to the canonical paths build.rs include_bytes!'s.
          set -euo pipefail
          mkdir -p payload/dpi
          cp -v "$(find artifact-payload -name ps5upload.elf.gz -print -quit)" payload/ps5upload.elf.gz
          cp -v "$(find artifact-payload -name ezremote-dpi.elf.gz -print -quit)" payload/dpi/ezremote-dpi.elf.gz
          test -s payload/ps5upload.elf.gz
          test -s payload/dpi/ezremote-dpi.elf.gz


      - name: Build engine sidecar binary
        working-directory: engine
        shell: bash
        run: cargo build --release -p ps5upload-engine --target "$RUST_TARGET"

      - name: Verify engine binary in place
        shell: bash
        run: |
          test -s "engine/target/${RUST_TARGET}/release/ps5upload-engine.exe"
          ls -la "engine/target/${RUST_TARGET}/release/ps5upload-engine.exe"

      - name: Build Tauri NSIS installer
        working-directory: client
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx tauri build --target "$RUST_TARGET" --bundles nsis --ci

      - name: Collect installer (canonical name)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          bundle="client/src-tauri/target/${RUST_TARGET}/release/bundle/nsis"
          ls -la "$bundle" || true
          setup="$(find "$bundle" -type f -name '*-setup.exe' -print -quit)"
          if [ -z "$setup" ]; then
            echo "::error::no NSIS *-setup.exe produced under $bundle"
            exit 1
          fi
          mkdir -p out
          # Deterministic, space-free name (matches historical asset + the
          # updater's windows-x86_64 regex).
          cp -v "$setup" "out/XENO_TOOL_${VERSION}_x64-setup.exe"
          ls -la out

      - name: Verify installer's inner EXE actually matches VERSION
        shell: pwsh
        run: |
          # 3.2.20 + 3.2.21 both shipped the 3.2.19 binary because actions/cache
          # restored target/ from a prior version (Cargo.lock-only key, see
          # cache step). The NSIS wrapper takes its name from $VERSION but
          # contains whatever EXE was cached. Extract the wrapped binary and
          # assert its FileVersion matches — fail loudly if not.
          $version = (Get-Content VERSION -Raw).Trim()
          $target = $env:RUST_TARGET
          $innerExe = "client/src-tauri/target/$target/release/XENO TOOL.exe"
          if (-not (Test-Path $innerExe)) {
            Write-Error "::error::inner XENO TOOL.exe not found at $innerExe"; exit 1
          }
          $info = (Get-Item $innerExe).VersionInfo
          Write-Host "inner exe FileVersion    = $($info.FileVersion)"
          Write-Host "inner exe ProductVersion = $($info.ProductVersion)"
          Write-Host "expected VERSION         = $version"
          if ($info.FileVersion -notlike "$version*") {
            Write-Error "::error::PE FileVersion '$($info.FileVersion)' does not match VERSION '$version' — cache likely served a stale binary. Refusing to publish."
            exit 1
          }
          Write-Host "OK — installer's inner EXE is genuinely $version"

      - name: Bundle XENO TOOL Web (Windows)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          # The Tauri build above ran beforeBuildCommand (build:vite) so
          # client/dist exists; the engine sidecar was built earlier.
          web="XENO_TOOL_Web"
          rm -rf "$web"
          mkdir -p "$web" out
          cp "engine/target/${RUST_TARGET}/release/ps5upload-engine.exe" "$web/xeno-web-server.exe"
          cp -r client/dist "$web/dist"
          cp web/launch-windows.bat "$web/"
          cp web/README.md "$web/"
          powershell -Command "Compress-Archive -Path '$web/*' -DestinationPath 'out/XENO_TOOL_Web_${VERSION}_windows_x64.zip' -Force"
          ls -la out

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop
          path: out/*
          if-no-files-found: error

  # ── Android APK (arm64, direct-install). ─────────────────────────────────
  build-android:
    needs: [build-payload]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUST_TARGET: aarch64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK r26b
        run: |
          echo y | sdkmanager "ndk;26.1.10909125" 2>/dev/null || true
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Sync version
        run: node scripts/update-version.js

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
            engine/target
          key: android-aarch64-v${{ hashFiles('VERSION') }}-${{ hashFiles('client/src-tauri/Cargo.lock', 'engine/Cargo.lock') }}

      - name: Restore payload artifact
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: artifact-payload

      - name: Place payload files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p payload/dpi
          cp "$(find artifact-payload -name ps5upload.elf.gz    -print -quit)" payload/ps5upload.elf.gz
          cp "$(find artifact-payload -name ezremote-dpi.elf.gz -print -quit)" payload/dpi/ezremote-dpi.elf.gz

      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund

      - name: Init Tauri Android project
        working-directory: client
        run: npx tauri android init

      - name: Build Android APK (arm64)
        working-directory: client
        run: npx tauri android build --apk --target aarch64

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          mkdir -p out
          APK="$(find client/src-tauri/gen/android -name '*.apk' \
                   -not -path '*/intermediates/*' -print -quit)"
          if [ -z "$APK" ]; then
            echo "::error::No APK produced under client/src-tauri/gen/android"
            exit 1
          fi
          cp -v "$APK" "out/XENO_TOOL_${VERSION}_arm64.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*
          if-no-files-found: error

  # ── iOS IPA (unsigned — install via Sideloadly). ─────────────────────────
  build-ios:
    needs: [build-payload]
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Sync version
        run: node scripts/update-version.js

      - name: Setup Rust with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
            engine/target
          key: ios-aarch64-v${{ hashFiles('VERSION') }}-${{ hashFiles('client/src-tauri/Cargo.lock', 'engine/Cargo.lock') }}

      - name: Restore payload artifact
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: artifact-payload

      - name: Place payload files
        run: |
          set -euo pipefail
          mkdir -p payload/dpi
          cp "$(find artifact-payload -name ps5upload.elf.gz    -print -quit)" payload/ps5upload.elf.gz
          cp "$(find artifact-payload -name ezremote-dpi.elf.gz -print -quit)" payload/dpi/ezremote-dpi.elf.gz

      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund

      - name: Init Tauri iOS project
        working-directory: client
        run: npx tauri ios init

      - name: Build frontend (dist/) — Tauri's beforeBuildCommand
        working-directory: client
        run: npm run build:vite

      - name: Build iOS app (unsigned, release)
        working-directory: client
        # Silence Homebrew tap-trust noise that floods the build log and
        # buries the real compiler error.
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail
          XCODEPROJ="$(find src-tauri/gen/apple -name '*.xcodeproj' -maxdepth 2 -print -quit)"
          echo "::notice::Project: $XCODEPROJ"

          # Patch pbxproj to disable signing before xcodebuild sees it
          PBXPROJ="$XCODEPROJ/project.pbxproj"
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' \
            "$PBXPROJ"

          # Extract first scheme (BSD awk-safe)
          SCHEME="$(xcodebuild -project "$XCODEPROJ" -list 2>&1 \
            | awk '/Schemes:/{f=1;next} f && /[^ \t]/{gsub(/^[ \t]+/,"",$0); print; exit}')"
          echo "::notice::Scheme: '$SCHEME'"

          # CRITICAL: Tauri names its generated build configs LOWERCASE
          # ("debug"/"release"). Passing "Release" silently falls back to
          # the default (debug), and debug mode makes the Rust xcode-script
          # expect a running dev server (the "-server-addr" file), which
          # doesn't exist in CI → panic. "release" bundles the dist/ we
          # just built and compiles Rust standalone.
          set +e
          xcodebuild build \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            > /tmp/xcode.log 2>&1
          RC=$?
          set -e
          if [ $RC -ne 0 ]; then
            echo "::group::Real build errors"
            # Print the 25 lines around the first panic / failure marker,
            # plus any compiler errors — skip the brew/export noise.
            FIRST="$(grep -nE 'panicked at|error(\[|:)|could not compile|Undefined symbol|ld: |BUILD FAILED|PhaseScriptExecution failed|The following build commands failed|fatal error' \
              /tmp/xcode.log | head -1 | cut -d: -f1)"
            if [ -n "$FIRST" ]; then
              START=$(( FIRST > 12 ? FIRST - 12 : 1 ))
              sed -n "${START},$(( FIRST + 12 ))p" /tmp/xcode.log \
                | while IFS= read -r line; do echo "::error::$line"; done
            fi
            echo "::endgroup::"
            echo "::error::xcodebuild exited $RC — see grouped errors above + uploaded xcode.log artifact"
            exit 1
          fi

      - name: Upload xcode log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-log
          path: /tmp/xcode.log
          if-no-files-found: warn

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          APP="$(find DerivedData -name '*.app' \
                   -not -path '*/Tests*' -not -path '*-simulator*' \
                   -maxdepth 8 -print -quit)"
          echo "Found .app: $APP"
          mkdir -p Payload out
          cp -r "$APP" Payload/
          (cd Payload && zip -r "../out/XENO_TOOL_${VERSION}_iOS_unsigned.ipa" .)
          ls -la out

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: out/*
          if-no-files-found: error

  # ── XENO TOOL Web (Linux x64) — engine + dist + launcher, zipped. ────────
  build-web-linux:
    needs: [build-payload]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Sync version
        run: node scripts/update-version.js

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install build deps (libclang for jpegxr bindgen)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: web-linux-v${{ hashFiles('VERSION') }}-${{ hashFiles('engine/Cargo.lock') }}

      - name: Restore payload artifact
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: artifact-payload

      - name: Place payload files
        run: |
          set -euo pipefail
          mkdir -p payload/dpi
          cp "$(find artifact-payload -name ps5upload.elf.gz    -print -quit)" payload/ps5upload.elf.gz
          cp "$(find artifact-payload -name ezremote-dpi.elf.gz -print -quit)" payload/dpi/ezremote-dpi.elf.gz

      - name: Install client deps
        working-directory: client
        run: npm ci --no-audit --no-fund

      - name: Build frontend (dist/)
        working-directory: client
        run: npm run build:vite

      - name: Build engine (linux x64)
        working-directory: engine
        run: cargo build --release -p ps5upload-engine --target x86_64-unknown-linux-gnu

      - name: Bundle XENO TOOL Web (Linux)
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          web="XENO_TOOL_Web"
          rm -rf "$web"
          mkdir -p "$web" out
          cp engine/target/x86_64-unknown-linux-gnu/release/ps5upload-engine "$web/xeno-web-server"
          chmod +x "$web/xeno-web-server"
          cp -r client/dist "$web/dist"
          cp web/launch-linux.sh "$web/"
          chmod +x "$web/launch-linux.sh"
          cp web/README.md "$web/"
          zip -r "out/XENO_TOOL_Web_${VERSION}_linux_x64.zip" "$web"
          ls -la out

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-linux
          path: out/*
          if-no-files-found: error

  # ── Assemble the complete, Latest release. ────────────────────────────────
  publish:
    needs: [build-payload, build-desktop, build-android, build-ios, build-web-linux]
    # Run even if mobile/web builds fail — desktop is the non-negotiable deliverable.
    if: always() && needs.build-desktop.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag from VERSION
        id: ver
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=v$VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          # Desktop installer — non-negotiable; abort if missing.
          SETUP="$(find artifacts -type f -name 'XENO_TOOL_*_x64-setup.exe' -print -quit)"
          if [ -z "$SETUP" ]; then
            echo "::error::desktop installer missing from artifacts"
            exit 1
          fi
          cp -v "$SETUP" "release/$(basename "$SETUP")"

          # Mobile + web builds — include if built, skip silently if not.
          for pat in "XENO_TOOL_*_arm64.apk" "XENO_TOOL_*_iOS_unsigned.ipa" \
                     "XENO_TOOL_Web_*_windows_x64.zip" "XENO_TOOL_Web_*_linux_x64.zip" \
                     "XENO-AIO.elf"; do
            f="$(find artifacts -type f -name "$pat" -print -quit)"
            if [ -n "$f" ]; then
              cp -v "$f" "release/$(basename "$f")"
            else
              echo "::notice::Optional asset not in this run: $pat"
            fi
          done

          ls -la release

      - name: Carry forward static third-party tools
        env:
          GH_TOKEN: ${{ github.token }}
          THIS_TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # CheatRunner.elf (maj0r) isn't built by CI. Pull it from the
          # newest prior release that still has it so every release stays
          # complete without committing it to git. (The standalone PS
          # Trainer Viewer exe is no longer shipped — the desktop setup app
          # already includes everything it did.)
          carry() {
            local name="$1"
            if [ -f "release/$name" ]; then echo "$name already present"; return 0; fi
            local tag
            for tag in $(gh release list --limit 25 --json tagName -q '.[].tagName'); do
              [ "$tag" = "$THIS_TAG" ] && continue
              if gh release download "$tag" -p "$name" -D release/ 2>/dev/null; then
                echo "carried $name from $tag"; return 0
              fi
            done
            echo "::warning::could not carry $name from any prior release"
          }
          carry CheatRunner.elf
          ls -la release

      - name: Generate latest.json updater manifest
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'XENO TOOL %s — 10,781+ cheats, Game Store, saves, payload sender, hardware view, nanoDNS.\n' "$VERSION" \
            > /tmp/notes.md
          python3 scripts/gen-updater-manifest.py \
            --release-dir release \
            --version "$VERSION" \
            --tag "$TAG" \
            --repo XENOKING123/XENOKING \
            --notes /tmp/notes.md \
            --out release/latest.json
          echo "--- latest.json ---"
          cat release/latest.json
          # Guard: the whole point is the Windows updater entry — fail if absent.
          python3 -c "import json,sys; u=json.load(open('release/latest.json')).get('assets',{}).get('windows-x86_64'); print('windows-x86_64 ->', u) if u else sys.exit('::error::latest.json missing windows-x86_64 asset')"

      - name: Publish complete Latest release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          # Full release notes — ALL features every release; delta at the bottom.
          {
          printf 'XENO TOOL %s — complete all-in-one PS4/PS5 toolkit.\n\n' "$VERSION"
          printf '## Desktop — XENO_TOOL_%s_x64-setup.exe\n' "$VERSION"
          printf -- '- **Fast Transfers** — FTX2 binary protocol + BLAKE3 shard verification + pack-small-files optimization.\n'
          printf -- '- **Native Image Mount** — .exfat / .ffpkg images via MDIOCATTACH + nmount; no third-party helpers.\n'
          printf -- '- **Payload Sender** — send any PS5 payload ELF over :9021.\n'
          printf -- '- **Live Hardware View** — model, serial, uptime, CPU frequency, RAM, and fan-threshold control.\n'
          printf -- '- **My Games** — live installed game library pulled from the console.\n'
          printf -- '- **Cheats** — 10,781+ PS4/PS5 cheats (JSON / SHN / MC4) powered by CheatRunner (maj0r).\n'
          printf -- '- **Game Store** — PS4/PS5 scraper with auto cover art, multi-mirror links, region + update support.\n'
          printf -- '- **Save Manager** — browse and manage PS5 save files on-device.\n'
          printf -- '- **nanoDNS** — built-in DNS helper for homebrew networking.\n'
          printf -- '- **Auto-Updater** — one-click in-app update via latest.json.\n'
          printf '\n## Android — XENO_TOOL_%s_arm64.apk\n' "$VERSION"
          printf -- '- **Direct install** — download the APK, enable "Unknown sources", install. No Play Store.\n'
          printf -- '- Connect to PS5 over WiFi, run cheats, send payloads, browse trainers — full tool.\n'
          printf '\n## iOS — XENO_TOOL_%s_iOS_unsigned.ipa\n' "$VERSION"
          printf -- '- **Unsigned IPA** — install free via [Sideloadly](https://sideloadly.io) with your Apple ID.\n'
          printf -- '- Re-signs every 7 days (free ID) or 1 year (paid Developer account).\n'
          printf -- '- Full tool over WiFi: connect to PS5, cheats, payloads, XENO CHAT, trainers.\n'
          printf '\n## Web — XENO_TOOL_Web_%s_windows_x64.zip / _linux_x64.zip\n' "$VERSION"
          printf -- '- **Run the full tool in a browser.** Launch the server on any always-on PC/mini-PC, open `http://<host-ip>:6969` from any phone, tablet or laptop — no install.\n'
          printf -- '- Same app as desktop: connect to PS5, hardware view, installed apps, plugin manager, file browser. Enter your PS5 IP in the UI.\n'
          printf '\n## On-Console Web ELF — XENO-AIO.elf\n'
          printf -- '- **Inject one ELF, open in a browser — already connected.** Send `XENO-AIO.elf` to your jailbroken PS5; it pops a toast with its URL (`http://<ps5-ip>:6969`). Open that from any browser and it **auto-connects to the console instantly** — no "enter IP + click connect" step like the desktop app. The full UI is embedded in the ELF, nothing else to copy. Same model as CheatRunner/garlic web.\n'
          printf -- '- One ELF runs the full payload AND the web UI: the web screens pull LIVE console data (e.g. Plugin Manager lists the real homebrew running on your PS5) by forwarding to the payload internally. More screens light up each release.\n'
          printf '\n## On-Console Tools (carried forward every release)\n'
          printf -- '- **CheatRunner.elf** — on-console cheat engine by maj0r (Discord: callmemaj0r). XENO TOOL is a frontend for it.\n'
          printf '\n## Cheat Database Credits\n'
          printf 'Cheats sourced from the **etaHEN PS5 Cheats** and **HEN Cheats Collection** repos via the etaHEN & GoldHEN Discord communities.\n'
          printf 'Contributors: **LM (lightningmods)**, **Buzzer (buzzer-re)**, **Super Death**, **GoldHEN Team**, **Yharnam**, **PS4Trainer**, and all cheat creators in the scene.\n'
          printf '\n---\n'
          printf '**v%s — whats new:** XENO-AIO.elf — inject one ELF, open the URL it toasts, and the full UI loads in any browser straight from the PS5 and AUTO-CONNECTS (no manual connect step). Plus XENO TOOL Web host zips (Windows + Linux), Plugin Manager, Android APK, and iOS IPA (Sideloadly).\n' "$VERSION"
          } > /tmp/release-notes.md
          # Create or update the release, always writing the full notes body.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --latest --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --title "XENO TOOL $TAG" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
          # Upload every asset, replacing any older copy.
          gh release upload "$TAG" release/* --clobber
          echo "Uploaded $(find release -type f | wc -l) assets to $TAG"

      - name: Scrub stale updater manifests from superseded releases
        env:
          GH_TOKEN: ${{ github.token }}
          THIS_TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # If an OLD release still carries latest.json and GitHub ever resolves
          # it as "Latest", shipped apps would read a stale manifest. Remove
          # latest.json from every release except the current one.
          for tag in $(gh release list --limit 25 --json tagName -q '.[].tagName'); do
            [ "$tag" = "$THIS_TAG" ] && continue
            gh release delete-asset "$tag" latest.json -y 2>/dev/null \
              && echo "scrubbed stale latest.json from $tag" || true
          done

      - name: Retire the standalone PS Trainer Viewer exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # The desktop setup app now includes everything the standalone
          # PS Trainer Viewer did, so drop it from every release.
          for tag in $(gh release list --limit 25 --json tagName -q '.[].tagName'); do
            gh release delete-asset "$tag" XENO_Trainer_Tool_v2.5.exe -y 2>/dev/null \
              && echo "removed XENO_Trainer_Tool_v2.5.exe from $tag" || true
          done
