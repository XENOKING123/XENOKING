name: ps5-app

# Cross-compiles the XENO Game Store PS5 app in the cloud (no local toolchain
# needed). Mirrors the official ps5-payload-dev CI: pull the prebuilt SDK
# tarball, then `make`. Uploads the built artifacts directly into the
# consolidated all-in-one release so every release always has everything.

on:
  push:
    paths:
      - 'ps5-app/**'
      - '.github/workflows/ps5-app.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ps5-app
    steps:
      - uses: actions/checkout@v4

      - name: Install PS5 payload SDK (prospero-clang)
        run: |
          wget -q https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz
          sudo tar xf ps5-payload-dev.tar.gz -C /
          ls /opt/ps5-payload-sdk/bin/prospero-clang

      - name: Build ELFs + homebrew package
        run: make all PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk

      - name: Assemble release assets
        run: |
          mkdir -p ../release
          cp xeno-store.elf          ../release/
          cp xeno-store-browser.elf  ../release/
          ( cd dist && zip -r ../../release/XENO-Game-Store.zip XENO-Game-Store )
          ls -la ../release

      - name: Upload build artifacts (archive)
        uses: actions/upload-artifact@v4
        with:
          name: xeno-ps5-app
          path: release/*
          if-no-files-found: error

      - name: Push new ELFs into the consolidated release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          # Always target the single consolidated release — keeps all XENO tools together.
          TAG="all-in-one-v3.2.12"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
            echo "Updated $TAG with new PS5 app artifacts."
          else
            echo "WARNING: consolidated release $TAG not found — skipping upload."
            echo "Create the release manually and re-run this workflow."
          fi
