name: ps5-app

# Builds the XENO Game Store PS5 ELFs and uploads them into the consolidated
# all-in-one release. Only fires when ps5-app source or this workflow changes.
#
# SDK: ps5-payload-dev/pacbrew-repo v0.36 (321 MB, self-contained — includes
# the real prospero-clang binary, not just shell wrappers). Pin to a specific
# tag so the build is reproducible and doesn't drift when upstream releases.
# Bump the tag here + the cache key suffix together when upgrading the SDK.

on:
  push:
    paths:
      - 'ps5-app/**'
      - '.github/workflows/ps5-app.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ps5-app

    env:
      SDK_TAG: v0.36
      PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk

    steps:
      - uses: actions/checkout@v4

      # Stream the 321 MB pacbrew tarball straight into tar — no temp file,
      # parallel download+extract, done in ~30-60 s on GHA runners.
      # curl flags: -f=fail on HTTP errors, -s=silent, -S=show errors, -L=follow redirects.
      - name: Install PS5 payload SDK (${{ env.SDK_TAG }})
        run: |
          curl -fsSL \
            "https://github.com/ps5-payload-dev/pacbrew-repo/releases/download/${{ env.SDK_TAG }}/ps5-payload-dev.tar.gz" \
            | sudo tar -xzf - -C /
          echo "--- prospero-clang ok ---"
          /opt/ps5-payload-sdk/bin/prospero-clang --version

      # gen_assets.py embeds index.html + catalog.json + logo.jpg as C arrays.
      # prospero-clang compiles main.c twice: server-only and server+browser.
      - name: Build ELFs + homebrew package
        run: make all PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk

      - name: Assemble release assets
        run: |
          mkdir -p ../release
          cp xeno-store.elf          ../release/
          cp xeno-store-browser.elf  ../release/
          ( cd dist && zip -r ../../release/XENO-Game-Store.zip XENO-Game-Store )
          echo "--- built assets ---"
          ls -lh ../release

      - name: Upload build artifacts (archive)
        uses: actions/upload-artifact@v4
        with:
          name: xeno-ps5-app
          path: release/*
          if-no-files-found: error

      - name: Push new ELFs into the consolidated release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          TAG="all-in-one-v3.2.12"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
            echo "Uploaded to $TAG"
          else
            echo "WARNING: release $TAG not found — skipping upload."
          fi
