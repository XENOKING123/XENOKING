name: ps5-app

# Builds the XENO Game Store PS5 ELFs and uploads them into the consolidated
# all-in-one release. Only fires when ps5-app source or this workflow changes.

on:
  push:
    paths:
      - 'ps5-app/**'
      - '.github/workflows/ps5-app.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ps5-app

    steps:
      - uses: actions/checkout@v4

      # Cache the SDK tarball so subsequent runs skip the large download.
      # Bump the cache key suffix (e.g. v1→v2) to force a fresh SDK fetch.
      - name: Cache PS5 payload SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ${{ runner.temp }}/ps5-sdk.tar.gz
          key: ps5-pacbrew-sdk-v1

      - name: Download PS5 payload SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          wget --tries=3 --retry-connrefused -q \
            -O "$RUNNER_TEMP/ps5-sdk.tar.gz" \
            https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz
          echo "SDK downloaded: $(du -sh "$RUNNER_TEMP/ps5-sdk.tar.gz" | cut -f1)"

      - name: Extract SDK
        run: |
          sudo tar xf "$RUNNER_TEMP/ps5-sdk.tar.gz" -C /
          ls /opt/ps5-payload-sdk/bin/prospero-clang

      - name: Build ELFs + homebrew package
        run: make all PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk

      - name: Assemble release assets
        run: |
          mkdir -p ../release
          cp xeno-store.elf          ../release/
          cp xeno-store-browser.elf  ../release/
          ( cd dist && zip -r ../../release/XENO-Game-Store.zip XENO-Game-Store )
          ls -la ../release

      - name: Upload build artifacts (archive)
        uses: actions/upload-artifact@v4
        with:
          name: xeno-ps5-app
          path: release/*
          if-no-files-found: error

      - name: Push new ELFs into the consolidated release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          TAG="all-in-one-v3.2.12"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
            echo "Updated $TAG with new PS5 app artifacts."
          else
            echo "WARNING: consolidated release $TAG not found — skipping upload."
            echo "Create the release manually and re-run this workflow."
          fi
